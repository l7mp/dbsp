controllers:
  # service controller:
  # - filter services that have an endpointslice controller annotation
  # - convert into simpler shape
  # - demux on spec.ports and
  - name: service-controller
    sources:
      - apiGroup: ""
        kind: Service
    pipeline:
      - "@select":
          "@exists": '$["metadata"]["annotations"]["dcontroller.io/endpointslice-controller-enabled"]'
      - "@project":
          metadata:
            name: $.metadata.name
            namespace: $.metadata.namespace
          spec:
            serviceName: $.metadata.name
            type: $.spec.type
            ports: $.spec.ports
      - "@unwind": $.spec.ports
      - "@project":
          metadata:
            name:
              "@concat": [$.spec.serviceName, "-", $.spec.ports.protocol, "-", $.spec.ports.port]
            namespace: $.metadata.namespace
          spec: $.spec
    targets:
      - kind: ServiceView
  # endpointslice controller:
  # - join services with the corresponding endpoint slices
  # - create a unique service-id used for grouping
  # - demux on "$.endpoints"
  # - filter ready addresses
  # - demux on $.endpoints.addresses
  # - group into a single endpoint list per service-id
  # - convert into simpler shape
  - name: endpointslice-controller
    sources:
      - kind: ServiceView
      - apiGroup: "discovery.k8s.io"
        kind: EndpointSlice
    pipeline:
      - "@join":
          "@and":
            - '@eq':
                - $.ServiceView.spec.serviceName
                - '$["EndpointSlice"]["metadata"]["labels"]["kubernetes.io/service-name"]'
            - '@eq':
                - $.ServiceView.metadata.namespace
                - $.EndpointSlice.metadata.namespace
      - "@project":
            metadata:
              name: $.ServiceView.metadata.name
              namespace: $.ServiceView.metadata.namespace
            spec:
              serviceName: $.ServiceView.spec.serviceName
              type: $.ServiceView.spec.type
              port: $.ServiceView.spec.ports.port
              targetPort: $.ServiceView.spec.ports.targetPort
              protocol: $.ServiceView.spec.ports.protocol
            endpoints: $.EndpointSlice.endpoints
            id:
              name: $.ServiceView.spec.serviceName
              namespace: $.ServiceView.metadata.namespace
              type: $.ServiceView.spec.type
              protocol: $.ServiceView.spec.ports.protocol
              port: $.ServiceView.spec.ports.port
              targetPort: $.ServiceView.spec.ports.targetPort
      - "@unwind": $.endpoints
      - "@select":
          "@eq": ["$.endpoints.conditions.ready", true]
      - "@unwind": $.endpoints.addresses
      - "@groupBy":
          - $.id
          - $.endpoints.addresses
      - "@project":
          metadata:
            namespace: $.key.namespace
            name:
              "@concat":
                - $.key.name
                - "-"
                - $.key.protocol
                - "-"
                - $.key.port
          spec:
            serviceName: $.key.name
            type: $.key.type
            port: $.key.port
            targetPort: $.key.targetPort
            protocol: $.key.protocol
            addresses: $.values
    targets:
      - kind: EndpointView
