apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcontroller-manager
  namespace: dcontroller-system
  labels:
    control-plane: dcontroller
spec:
  selector:
    matchLabels:
      control-plane: dcontroller
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: dcontroller
      labels:
        control-plane: dcontroller
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - command:
        - /dbsp
        args:
        - {{ .Values.script | default "/dcontroller/dcontroller.js" }}
        image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        name: dcontroller
        env:
        - name: DCONTROLLER_API_SERVER_ENABLED
          value: {{ ternary "true" "false" .Values.apiServer.enabled | quote }}
        - name: DCONTROLLER_API_SERVER_MODE
          value: {{ .Values.apiServer.mode | quote }}
        - name: DCONTROLLER_API_SERVER_ADDR
          value: "0.0.0.0"
        - name: DCONTROLLER_API_SERVER_PORT
          value: {{ printf "%d" .Values.apiServer.port | quote }}
        - name: DCONTROLLER_API_SERVER_HTTP
          value: {{ ternary "true" "false" (eq .Values.apiServer.mode "development") | quote }}
        - name: DCONTROLLER_API_SERVER_INSECURE
          value: {{ ternary "true" "false" (eq .Values.apiServer.mode "development") | quote }}
        - name: DCONTROLLER_API_SERVER_OPENAPI
          value: "true"
{{- if and .Values.apiServer.enabled (eq .Values.apiServer.mode "production") }}
        - name: DCONTROLLER_API_SERVER_CERT_FILE
          value: "/etc/dcontroller/tls/tls.crt"
        - name: DCONTROLLER_API_SERVER_KEY_FILE
          value: "/etc/dcontroller/tls/tls.key"
        - name: DCONTROLLER_AUTH_PRIVATE_KEY_FILE
          value: "/etc/dcontroller/tls/tls.key"
        - name: DCONTROLLER_AUTH_PUBLIC_KEY_FILE
          value: "/etc/dcontroller/tls/tls.crt"
{{- end }}
{{- if .Values.apiServer.enabled }}
        ports:
        - name: api
          containerPort: {{ .Values.apiServer.port }}
          protocol: TCP
{{- end }}
        securityContext:
          allowPrivilegeEscalation: false
{{- if .Values.apiServer.enabled }}
        livenessProbe:
          tcpSocket:
            port: api
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: api
          initialDelaySeconds: 5
          periodSeconds: 10
{{- end }}
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
{{- if and .Values.apiServer.enabled (eq .Values.apiServer.mode "production") }}
        volumeMounts:
        - name: tls
          mountPath: /etc/dcontroller/tls
          readOnly: true
{{- end }}
{{- if and .Values.apiServer.enabled (eq .Values.apiServer.mode "production") }}
      volumes:
      - name: tls
        secret:
          secretName: {{ .Values.apiServer.tls.secretName }}
{{- end }}
      serviceAccountName: dcontroller-account
      terminationGracePeriodSeconds: 10
