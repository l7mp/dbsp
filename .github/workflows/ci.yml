name: CI

on:
  push:
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - connectors/kubernetes
          - connectors/misc
          - dcontroller
          - engine
          - js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Run golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: ./...

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Run fast test suite
        run: make test-fast

      - name: Build all modules
        run: make build

  dcontroller-chart-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Build dcontroller Helm chart
        run: make -C dcontroller chart

  dcontroller-image-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dcontroller image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dcontroller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
